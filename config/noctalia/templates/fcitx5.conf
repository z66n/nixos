# vim: ft=dosini
[Metadata]
Name=noctalia
Version=1.0
Author=z66n
Description=noctalia color theme
ScaleWithDPI=True

[InputPanel]
Font=Sans 13
Spacing=3

# Unselected candidate color
# Text
NormalColor={{colors.on_surface.default.hex}}
# Selected candidate color
# Base
HighlightCandidateColor={{colors.surface_container.default.hex}}
# Input character color
# Blue
HighlightColor={{colors.primary.default.hex}}
# Input character background color
# Surface 0
HighlightBackgroundColor={{colors.on_surface_variant.default.hex}}

[InputPanel/TextMargin]
Left=18
Right=18
Top=8
Bottom=8

[InputPanel/Background]
# Surface 0
Color={{colors.surface_container_high.default.hex}}

# Uncomment this to switch to rounded-corner
# Image=panel.svg

[InputPanel/Background/Margin]
Left=10
Right=10
Top=10
Bottom=10

[InputPanel/Highlight]
# Blue
Color={{colors.primary.default.hex}}

# Uncomment this to switch to rounded-corner
# Image=highlight.svg

[InputPanel/Highlight/Margin]
Left=18
Right=18
Top=8
Bottom=8

[Menu]
Font=Sans 10
# Text
NormalColor={{colors.on_surface.default.hex}}
Spacing=3

[Menu/Background]
# Surface 0
Color={{colors.surface_container_high.default.hex}}

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
# Pink
Color={{colors.error.default.hex}}

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
# Base
Color={{colors.surface_container.default.hex}}

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5
